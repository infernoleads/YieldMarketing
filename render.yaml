# render.yaml — Yield Transfers (one-click deploy)
# In Render: New → Blueprint → pick this repo → Apply.
#
# Creates ONE web service + a PostgreSQL database. The database URL and a JWT
# secret are wired automatically. Your calendar and sending address are already
# filled in below, so the ONLY thing you add is your Gmail App Password
# (GMAIL_APP_PASSWORD) to turn on email. The booking calendar shows with no setup.

services:
  - type: web
    name: yield-transfers
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run db:seed && npm run build
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true                 # auto-generated, no action needed
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: yield-transfers-db
          property: connectionString        # auto-wired to the database below

      # ── Email (Gmail) — sender + alerts pre-filled ──
      - key: GMAIL_USER
        value: info@yieldtransfers.com
      - key: ADMIN_EMAIL
        value: info@yieldtransfers.com
      # 👉 The one thing YOU add: a Google App Password for info@yieldtransfers.com
      #    (Google account → Security → App passwords). Paste it in the Render dashboard.
      - key: GMAIL_APP_PASSWORD
        sync: false

      # ── Booking calendar — already set to your Google calendar ──
      - key: VITE_BOOKING_CALENDAR_URL
        value: https://calendar.app.google/XJZhDDoikmXdwb56A

databases:
  - name: yield-transfers-db
    plan: free
